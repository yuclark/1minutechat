<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ OneMinuteChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #0a0e17;
            --bg-surface: #121824;
            --bg-bubble-you: #4f46e5;
            --bg-bubble-stranger: #1e2538;
            --border: #222d42;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); height: 100vh; width: 100vw; overflow: hidden; display: flex; }

        .app-shell { display: flex; width: 100%; height: 100%; }

        /* Left Sidebar (Desktop Viewport) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            justify-content: space-between;
            z-index: 10;
        }

        .panel-top { display: flex; flex-direction: column; gap: 32px; }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; color: white; }
        .logo-area i { color: var(--accent); }

        .widget-card {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .widget-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; }
        .status-display { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot.matching { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .timer-display { font-size: 36px; font-weight: 700; font-family: monospace; color: white; display: flex; align-items: center; gap: 12px; }
        .timer-display.urgent { color: var(--danger); animation: jitter 0.2s infinite secondary; }

        /* Main Workspace Panel */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); position: relative; }

        /* Navigation Bar Header (Mobile Viewport) */
        .mobile-header {
            display: none;
            padding: 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        /* Message Stream */
        .messages-container { flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row { display: flex; width: 100%; animation: slideUp 0.2s ease-out; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.them { justify-content: flex-start; }
        .msg-row.sys { justify-content: center; }

        .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            max-width: 65%;
            word-wrap: break-word;
        }
        .msg-row.me .bubble { background: var(--bg-bubble-you); color: white; border-bottom-right-radius: 4px; }
        .msg-row.them .bubble { background: var(--bg-bubble-stranger); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg-row.sys .bubble { background: transparent; color: var(--text-muted); font-size: 13px; font-style: italic; text-align: center; max-width: 100%; }

        /* Bottom Controls Dock */
        .bottom-dock { padding: 24px 32px; background: linear-gradient(transparent, var(--bg-base) 40%); display: flex; gap: 16px; align-items: center; z-index: 10; }
        .input-bar {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 4px 8px 4px 16px;
            display: flex;
            align-items: center;
        }
        .input-bar:focus-within { border-color: var(--accent); }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            padding: 12px 0;
        }
        .input-bar input:disabled { cursor: not-allowed; opacity: 0.4; }

        .btn {
            border: none; outline: none; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; transition: all 0.2s ease;
        }
        .btn-skip { background: #1a1625; color: #a5b4fc; border: 1px solid #2e264d; padding: 14px 24px; border-radius: 14px; gap: 8px; }
        .btn-skip:hover { background: #251e36; color: white; border-color: var(--accent); }

        .btn-send { width: 42px; height: 42px; background: var(--accent); color: white; border-radius: 10px; font-size: 16px; }
        .btn-send:hover { background: #4f46e5; }
        .btn-send:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* Full Screen Radar Search System Overlay */
        .match-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base); z-index: 5;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 24px;
        }
        .radar-circle {
            width: 96px; height: 96px; border-radius: 50%;
            background: rgba(99, 102, 241, 0.03); border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--accent);
            animation: radar-pulse 2s infinite ease-in-out;
        }

        .hidden { display: none !important; }

        @keyframes radar-pulse {
            0% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.3); }
            70% { transform: scale(1); box-shadow: 0 0 0 24px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        @keyframes slideUp { 0% { transform: translateY(6px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .bottom-dock { padding: 16px; }
            .messages-container { padding: 16px; }
            .bubble { max-width: 80%; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="panel-top">
            <div class="logo-area">
                <i class="fa-solid fa-bolt"></i>
                <span>OneMinuteChat</span>
            </div>
            <div class="widget-card">
                <span class="widget-label">Session Status</span>
                <div class="status-display" id="statusBox">
                    <span class="dot" id="statusDot"></span>
                    <span id="statusTxt">Connecting...</span>
                </div>
            </div>
            <div class="widget-card">
                <span class="widget-label">Time Remaining</span>
                <div class="timer-display" id="timerBox">
                    <i class="fa-regular fa-clock" style="font-size: 24px; color: var(--text-muted)"></i>
                    <span id="timerVal">01:00</span>
                </div>
            </div>
        </div>
        <div style="font-size: 12px; color: var(--text-muted); line-height: 1.4;">
            <i class="fa-solid fa-user-shield" style="margin-right: 6px;"></i> Secure session active. Conversations are fully non-persistent.
        </div>
    </aside>

    <main class="chat-main">
        <header class="mobile-header">
            <div class="status-display" id="mobileStatusBox">
                <span class="dot" id="mobileStatusDot"></span>
                <span id="mobileStatusTxt">Connecting...</span>
            </div>
            <div class="timer-display" id="mobileTimerBox" style="font-size: 18px; gap: 6px;">
                <span id="mobileTimerVal">01:00</span>
            </div>
        </header>

        <div class="match-overlay" id="matchOverlay">
            <div class="radar-circle">
                <i class="fa-solid fa-satellite-dish"></i>
            </div>
            <h3 style="font-weight: 500; color: var(--text-muted);" id="overlayStatusMsg">Connecting to server...</h3>
        </div>

        <div class="messages-container" id="messagesBox"></div>

        <div class="bottom-dock">
            <button class="btn btn-skip" onclick="sendSkip()">
                <i class="fa-solid fa-forward-step"></i>
                <span>Skip</span>
            </button>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Send an anonymous message..." onkeypress="handleKey(event)" disabled>
                <button class="btn btn-send" id="sendBtn" onclick="sendMessage()" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
